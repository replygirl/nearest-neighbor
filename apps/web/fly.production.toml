app = "nearest-neighbor-web-production"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
dockerfile = "apps/web/Dockerfile"

[deploy]
strategy = "bluegreen"

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "15s"
timeout = "5s"
method = "get"
path = "/"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"

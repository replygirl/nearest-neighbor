[test]
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
# Exclude workspace packages from API coverage; they have their own thresholds.
coveragePathIgnorePatterns = ["**/packages/**"]
# Coverage is opt-in via --coverage flag.
# Global teardown: closes the postgres.js pool after all test files complete so
# bun test exits cleanly with code 0 rather than being force-killed (code 99).
preload = ["./src/test/global-teardown.ts"]

[test.coverageThreshold]
line = 0.95
function = 0.95
branch = 0.80

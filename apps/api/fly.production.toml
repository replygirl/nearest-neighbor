app = "nearest-neighbor-production"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
dockerfile = "apps/api/Dockerfile"

[deploy]
strategy = "bluegreen"
release_command = "/app/migrate"
release_command_timeout = "5m"

[env]
NODE_ENV = "production"
PORT = "8080"
LOG_LEVEL = "info"

[processes]
web = "/app/server"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1
processes = ["web"]

[[http_service.checks]]
grace_period = "10s"
interval = "15s"
timeout = "5s"
method = "get"
path = "/health"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"

# cocogitto configuration for the nearest-neighbor platform.
#
# cog's ONLY job here is to COMPUTE the next semver from conventional commits
# (`cog bump --dry-run`, which prints the version and does nothing else). It
# must NOT rewrite any manifest: there are no `bump_profiles`, and the
# `pre_bump_hooks` / `post_bump_hooks` are intentionally empty.
#
# The release workflow (.github/workflows/release.yml) takes that computed
# version and stamps it into every manifest via `mise run release:set-version`
# (apps/cli/Cargo.toml + Cargo.lock, both plugin.json, pyproject.toml, both
# marketplace.json), commits that on main, then tags — so one consistent
# version ships across the CLI crate and the plugin marketplaces.

# Annotated tag with a leading `v` (matches the existing v1.0.x tags; the
# unified release.yml computes and pushes this tag).
tag_prefix = "v"

# Conventional Commits only — no manifest bumping.
from_latest_tag = true
ignore_merge_commits = true

# No package/manifest is declared to cog, so `cog bump` itself never touches
# any version file — the release workflow's set-version step owns that.

# Explicitly empty: do not run anything that could rewrite a manifest.
pre_bump_hooks = []
post_bump_hooks = []

[changelog]
# Changelog generation is handled by `communique` (AI release notes), not cog.
# These remain for `cog changelog` ad-hoc use.
authors = []

[commit_types]
# Standard conventional-commit types; matches the scopes used in this repo.

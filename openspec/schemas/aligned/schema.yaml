name: aligned
version: 1
description: Aligned workflow — spec-driven with cross-change dependency tracking

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.

      - **Impact**: Affected files, packages, apps, dependencies, or systems.
        List every file path created or modified. Mark breaking changes with **BREAKING**.
        Identify affected packages and apps. State backward compatibility explicitly.

      - **Principles alignment**: Note which principles from openspec/principles.md
        this change serves. A table with EMBODIES / MEETS / CHALLENGES / N/A for
        each principle is ideal.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between proposal and specs phases. Research existing specs before filling
      this in. Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" —
      implementation details belong in design.md.


      This is the foundation — specs, design, blocking-changes, and tasks all
      build on this.
    requires: []

  - id: blocking-changes
    generates: blocking-changes.md
    description: Cross-change dependency graph — which other changes must ship first
    template: blocking-changes.md
    instruction: >
      Determine which other openspec changes must ship before this one.


      PROCESS — do all of these before writing the artifact:

      1. Read this change's proposal.md to understand what it consumes:
         configs, tools, tasks, modules, helpers, schemas, and any business
         or safety prerequisites.

      2. Scan EVERY active change in openspec/changes/ — read each proposal.md
         (at minimum the "What Changes" and "Capabilities" sections) to build a
         map of what each change PROVIDES.

      3. Scan openspec/changes/archive/ to identify already-shipped providers.

      4. Cross-reference: for each thing this change consumes, find the change
         that introduces it. That's a dependency. Classify as:
         - **Blocked by** (hard) — this change cannot function without it.
           Includes both technical deps AND business/safety ordering constraints.
         - **Soft-blocked by** — this change works without it but features
           degrade or context is missing.

      5. Present the proposed dependency list and ask the user to confirm before
         finalizing. They may add dependencies for reasons not visible in the
         code (business priority, safety ordering, team coordination).


      FORMAT:

      - Each entry is a checkbox: `- [ ] \`change-name\` — what it provides`

      - Check the box (`[x]`) if the change is already archived, and append
        *(archived YYYY-MM-DD)*.

      - If there are no dependencies in a section, write `None.`

      - Keep descriptions short (one phrase explaining what the dependency
        provides).
    requires:
      - proposal

  - id: specs
    generates: specs/**/*.md
    description: Requirements specifications — ADDED/MODIFIED/REMOVED requirements
    template: specs.md
    instruction: >
      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability>/ when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3
      hashtags or bullets will fail silently.

      - Every requirement MUST have at least one scenario.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios)

      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior

      4. Ensure header text matches exactly (whitespace-insensitive)


      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time. If adding new concerns without changing existing behavior,
      use ADDED instead.


      Specs should be testable — each scenario is a potential test case.
      Reference openspec/principles.md when scoping requirements.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.


      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding


      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve


      Every decision MUST state what happens on failure. Include rollback plan
      for schema changes. Reference the proposal for motivation and specs for
      requirements. Focus on architecture and approach, not line-by-line code.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the template exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.


      Guidelines:

      - Group related tasks under ## numbered headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Every code-change task MUST have a corresponding test/verification task

      - Include a lint+format verification task at the end

      - Order tasks by dependency — earlier tasks must not depend on later ones

      - Tasks should be small enough to complete in one session

      - Include a verification step (expected output) for each non-trivial task


      Reference specs for what needs to be built, design for how to build it.
      Each task should be verifiable — you know when it's done.
    requires:
      - specs
      - design

apply:
  requires:
    - tasks
    - blocking-changes
  tracks: tasks.md
  instruction: |
    BEFORE starting any implementation work, check blocking-changes.md:
    1. Read the "Blocked by" section.
    2. For each unchecked item (`- [ ]`), check whether the change exists in
       openspec/changes/archive/. If it does, check the box and append
       *(archived YYYY-MM-DD)*.
    3. If ANY "Blocked by" item remains unchecked after verification, STOP.
       Do NOT proceed with implementation. Report to the user:
       - Which blocking changes are unresolved
       - What each one provides that this change needs
       - Suggest which changes to implement and archive first
    4. If there are unchecked "Soft-blocked by" items, report them to the
       user BEFORE proceeding: list each one, what it provides, and what
       degrades without it. Ask the user to confirm they want to proceed
       without these. Do NOT silently skip them.

    Once the gate passes:
    5. Read openspec/principles.md before touching any code. Confirm the
       implementation approach is consistent with all applicable principles,
       especially: scope discipline (Principle 7), spec-before-code (Principle 3),
       and no --no-verify (Principle 7). If an implementation choice challenges a
       principle, surface it to the user rather than proceeding silently.
    6. Work through pending tasks in order, marking each complete as you go.
       Pair every code task with its verification task before moving on.
    7. Pause if you hit blockers, ambiguity, or scope creep. Report specifically
       what the issue is and what you need to proceed.

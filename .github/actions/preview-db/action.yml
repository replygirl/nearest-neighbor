name: Preview database
description: Create or drop a per-PR database inside the shared staging Postgres cluster via a flyctl WireGuard proxy + psql.

inputs:
  action:
    description: create | drop
    required: true
  pr-number:
    description: Pull request number
    required: true
  admin-url:
    description: >
      libpq URL to the staging Postgres cluster as a role that can CREATE/DROP
      DATABASE — e.g.
      postgres://postgres:PASSWORD@nearest-neighbor-db-staging.flycast:5432/postgres.
      Empty on un-bootstrapped repos, in which case the action no-ops and reports
      bootstrapped=false so callers can skip cleanly. The password must be
      URL-encoded if it contains '@' or '/'.
    required: false
    default: ''
  fly-api-token:
    description: Fly API token (used to open the WireGuard proxy to the private cluster)
    required: true
  pg-app:
    description: Fly app name of the staging Postgres cluster
    required: false
    default: nearest-neighbor-db-staging
  proxy-port:
    description: Local port for the flyctl proxy tunnel
    required: false
    default: '15432'

outputs:
  bootstrapped:
    description: true when admin-url + fly token are present; false means the caller should skip
    value: ${{ steps.check.outputs.bootstrapped }}
  database-url:
    description: Connection URL for the per-PR database (set on action=create only)
    value: ${{ steps.run.outputs.database-url }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      env:
        ADMIN_URL: ${{ inputs.admin-url }}
        FLY_API_TOKEN: ${{ inputs.fly-api-token }}
      run: |
        if [ -z "$ADMIN_URL" ] || [ -z "$FLY_API_TOKEN" ]; then
          echo "::notice::preview-db: STAGING_DATABASE_ADMIN_URL or FLY_API_TOKEN is empty — skipping DB ${{ inputs.action }}. Set the secret to enable per-PR databases (see CONTRIBUTING.md)."
          echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
        else
          echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
        fi

    - id: run
      if: steps.check.outputs.bootstrapped == 'true'
      shell: bash
      env:
        ACTION: ${{ inputs.action }}
        PR_NUMBER: ${{ inputs.pr-number }}
        ADMIN_URL: ${{ inputs.admin-url }}
        FLY_API_TOKEN: ${{ inputs.fly-api-token }}
        PG_APP: ${{ inputs.pg-app }}
        PROXY_PORT: ${{ inputs.proxy-port }}
      run: |
        set -euo pipefail

        DB_NAME="nn_pr_${PR_NUMBER}"

        # Parse the admin URL: scheme://USER:PASS@HOST:PORT/DB?Q
        rest="${ADMIN_URL#*://}"
        creds="${rest%%@*}"          # USER:PASS
        hostpath="${rest#*@}"        # HOST:PORT/DB?Q
        hostport="${hostpath%%/*}"   # HOST:PORT

        pass="${creds#*:}"
        if [ -n "$pass" ] && [ "$pass" != "$creds" ]; then echo "::add-mask::$pass"; fi

        # URL the preview app uses at runtime: private flycast host, per-PR db.
        APP_DB_URL="postgres://${creds}@${hostport}/${DB_NAME}"
        echo "::add-mask::$APP_DB_URL"

        # URL psql uses here, through the proxy tunnel, against the admin db.
        CI_DB_URL="postgres://${creds}@localhost:${PROXY_PORT}/postgres?sslmode=disable"
        echo "::add-mask::$CI_DB_URL"

        # Open the WireGuard proxy to the private cluster.
        flyctl proxy "${PROXY_PORT}:5432" --app "$PG_APP" &
        PROXY_PID=$!
        cleanup() { kill "$PROXY_PID" 2>/dev/null || true; }
        trap cleanup EXIT

        # Wait for the tunnel to accept connections.
        for _ in $(seq 1 30); do
          if pg_isready -h localhost -p "$PROXY_PORT" >/dev/null 2>&1; then break; fi
          sleep 1
        done

        if [ "$ACTION" = "create" ]; then
          exists=$(psql "$CI_DB_URL" -tAc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'")
          if [ "$exists" != "1" ]; then
            psql "$CI_DB_URL" -c "CREATE DATABASE \"${DB_NAME}\""
            echo "Created database ${DB_NAME}"
          else
            echo "Database ${DB_NAME} already exists"
          fi
          echo "database-url=${APP_DB_URL}" >> "$GITHUB_OUTPUT"
        elif [ "$ACTION" = "drop" ]; then
          psql "$CI_DB_URL" -c "DROP DATABASE IF EXISTS \"${DB_NAME}\" WITH (FORCE)" || true
          echo "Dropped database ${DB_NAME}"
        else
          echo "Unknown action: $ACTION" >&2
          exit 1
        fi

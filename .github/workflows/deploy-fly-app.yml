name: Deploy Fly App (reusable)

on:
  workflow_call:
    inputs:
      app:
        description: Fly app name
        required: true
        type: string
      env:
        description: Environment — prod | staging | preview
        required: true
        type: string
      config-path:
        description: Path to fly.toml relative to repo root
        required: true
        type: string
      environment:
        description: GitHub Environment (for required reviewers + secrets scoping)
        required: false
        type: string
        default: ''
      region:
        description: Fly region
        required: false
        type: string
        default: iad
    outputs:
      url:
        description: Deployed app URL
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
        with:
          version: 'latest'

      - name: Deploy
        id: deploy
        run: |
          strategy="rolling"
          extra=()
          if [[ "${{ inputs.env }}" == "prod" ]]; then
            strategy="bluegreen"
          elif [[ "${{ inputs.env }}" == "preview" ]]; then
            # Ephemeral previews: a single machine (--ha=false, no HA spare) with
            # the `immediate` strategy. Rolling updates across an auto-stopped HA
            # pair raced the scale-to-zero machinery — flyctl 408'd updating the
            # second machine, or timed out waiting for it to reach a good state.
            # immediate replaces without that health-state wait; one machine has
            # no second machine to race.
            strategy="immediate"
            extra+=(--ha=false)
          fi
          # Build context is the repo root (Dockerfiles COPY workspace files from
          # root); the config lives under apps/<app>/. The explicit "." sets the
          # context while [build].dockerfile in the toml is resolved config-relative.
          # VITE_POSTHOG_* are the PUBLIC posthog project key + host, baked into
          # the landing-page bundle at build time. Sourced from environment-scoped
          # GitHub Actions variables (not secrets — they ship to the browser).
          # Empty when unset → web analytics is a silent no-op.
          flyctl deploy . \
            --app "${{ inputs.app }}" \
            --config "${{ inputs.config-path }}" \
            --strategy "$strategy" \
            "${extra[@]}" \
            --remote-only \
            --build-arg "VITE_POSTHOG_KEY=${{ vars.VITE_POSTHOG_KEY }}" \
            --build-arg "VITE_POSTHOG_HOST=${{ vars.VITE_POSTHOG_HOST }}"
          echo "url=https://${{ inputs.app }}.fly.dev" >> "$GITHUB_OUTPUT"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

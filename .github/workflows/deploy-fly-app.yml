name: Deploy Fly App (reusable)

on:
  workflow_call:
    inputs:
      app:
        description: Fly app name
        required: true
        type: string
      env:
        description: Environment — prod | staging
        required: true
        type: string
      config-path:
        description: Path to fly.toml relative to repo root
        required: true
        type: string
      environment:
        description: GitHub Environment (for required reviewers + secrets scoping)
        required: false
        type: string
        default: ''
      region:
        description: Fly region
        required: false
        type: string
        default: iad
    outputs:
      url:
        description: Deployed app URL
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
        with:
          version: 'latest'

      - name: Deploy
        id: deploy
        run: |
          strategy="rolling"
          if [[ "${{ inputs.env }}" == "prod" ]]; then
            strategy="bluegreen"
          fi
          # Build context is the repo root (Dockerfiles COPY workspace files from
          # root); the config lives under apps/<app>/. The explicit "." sets the
          # context while [build].dockerfile in the toml is resolved config-relative.
          flyctl deploy . \
            --app "${{ inputs.app }}" \
            --config "${{ inputs.config-path }}" \
            --strategy "$strategy" \
            --remote-only \
            --region "${{ inputs.region }}"
          echo "url=https://${{ inputs.app }}.fly.dev" >> "$GITHUB_OUTPUT"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

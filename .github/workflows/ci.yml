name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bun: ${{ steps.filter.outputs.bun || steps.all.outputs.all }}
      rust: ${{ steps.filter.outputs.rust || steps.all.outputs.all }}
      shell: ${{ steps.filter.outputs.shell || steps.all.outputs.all }}
      actions: ${{ steps.filter.outputs.actions || steps.all.outputs.all }}
      python: ${{ steps.filter.outputs.python || steps.all.outputs.all }}
      plugin: ${{ steps.filter.outputs.plugin || steps.all.outputs.all }}
    steps:
      - uses: actions/checkout@v7
      # The merge queue must validate the squashed candidate in full, and
      # dorny/paths-filter has no reliable base on merge_group events — so force
      # every surface on for merge_group and skip the path filter entirely.
      - id: all
        if: github.event_name == 'merge_group'
        run: echo "all=true" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        if: github.event_name != 'merge_group'
        id: filter
        with:
          filters: |
            bun:
              - 'apps/**/*.{ts,tsx,js,jsx,mjs,cjs}'
              - 'packages/**/*.{ts,tsx,js,jsx,mjs,cjs}'
              - 'package.json'
              - 'bun.lock'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            rust:
              - 'apps/cli/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            shell:
              - 'scripts/**/*.sh'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            python:
              - 'plugins/hermes/**/*.py'
              - 'plugins/hermes/pyproject.toml'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            plugin:
              - 'plugins/**'
              - 'apps/cli/**'
              - '.claude-plugin/marketplace.json'
              - '.agents/plugins/marketplace.json'
              - 'e2e/plugins/**'
              - 'e2e/plugin-install/**'
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            actions:
              # Workflow files and composite actions. Captures the case where a
              # PR only edits a workflow other than ci.yml (or only a composite
              # action) — those wouldn't match any surface filter above, but
              # ci-actions-lint still validates the YAML so a broken workflow
              # can't merge with all gated jobs skipped.
              - '.github/workflows/**'
              - '.github/actions/**'

  ci-bun:
    needs: detect-changes
    if: needs.detect-changes.outputs.bun == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nearest_neighbor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nearest_neighbor_test
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-mise
      - run: bun install --frozen-lockfile
      - run: mise run lint
      - run: mise run format:check
      - run: mise run typecheck
      - run: mise run web:brand-assets:check
      - run: mise run test
      # TODO: coverage gate is non-blocking until the test suite reaches 95%
      # threshold. Remove continue-on-error once coverage is stable.
      - name: Coverage (informational)
        run: mise run test:coverage
        continue-on-error: true

  ci-rust:
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-mise
      - name: Format check
        run: mise run //apps/cli:fmt:check
      - name: Clippy
        run: mise run //apps/cli:clippy
      - name: Tests
        env:
          NBR_NO_KEYRING: '1'
        run: mise run //apps/cli:test

  # Cross-compile the CLI for every release target on PRs so a platform-only
  # break (e.g. Unix-only std APIs that don't exist on Windows) fails the gate
  # here instead of surfacing at release time. `cargo check` is enough to catch
  # compile errors without the cost of a full optimized build. Mirrors the
  # target/runner matrix in release.yml.
  cli-cross:
    name: CLI cross-check ${{ matrix.target }}
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Smallest/newest native runner per target — same set release.yml ships.
        include:
          - target: aarch64-apple-darwin
            runner: macos-26
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-26.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-26.04
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.target }}
          workspaces: apps/cli
      - name: Check
        working-directory: apps/cli
        run: cargo check --target ${{ matrix.target }}

  ci-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-mise
      - name: Ruff lint
        run: mise run lint:ci
      - name: Ruff format check
        run: mise run format:check
      - name: ty type-check
        # Source modules only: run from repo root so the `plugins.hermes` package
        # path resolves the relative import, and tests/ (intentional junk types) is
        # excluded — its runtime behaviour is covered by pytest in ci-plugins.
        run: mise exec -- ty check plugins/hermes/*.py

  # Plugin e2e: hook isolation tests (fast, no keys) + in-harness install tests
  # (Docker, no keys — builds nbr from HEAD and installs the plugin into the real
  # Claude/Codex/Hermes CLIs). ubuntu-latest ships Docker, so run.sh runs for real
  # (it self-skips only when no Docker daemon is reachable).
  ci-plugins:
    needs: detect-changes
    if: needs.detect-changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-mise
      - run: bun install --frozen-lockfile
      - name: Hook isolation tests (claude + codex shell hooks, install-nbr)
        run: mise run test:plugins
      - name: Hook isolation tests (hermes pytest)
        run: mise run test:plugins:hermes
      - name: In-harness install tests (Docker — claude/codex/hermes)
        run: mise run test:plugins:harness

  ci-shell:
    needs: detect-changes
    if: needs.detect-changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-mise
      - name: Shellcheck
        run: |
          files=$(find scripts -name '*.sh' 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell files found — skipping shellcheck"
          fi

  ci-actions-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-mise
      - name: Lint workflow YAML
        # actionlint with no args auto-discovers every workflow under
        # .github/workflows/ regardless of extension or nesting depth.
        run: mise exec -- actionlint
      - name: Validate composite-action YAML syntax
        # actionlint is not designed for composite-action manifests (different
        # schema, triggers spurious "missing jobs/on" errors). Fall back to a
        # parse-only check so a syntax-broken composite still blocks the gate.
        run: |
          shopt -s nullglob
          files=(.github/actions/*/action.yml .github/actions/*/action.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No composite actions to validate."
            exit 0
          fi
          for f in "${files[@]}"; do
            ruby -ryaml -e "YAML.safe_load(File.read(ARGV[0]))" "$f" \
              || { echo "::error file=$f::YAML parse failure"; exit 1; }
            echo "ok: $f"
          done

  ci-gate:
    if: always()
    needs: [detect-changes, ci-bun, ci-rust, cli-cross, ci-python, ci-plugins, ci-shell, ci-actions-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          DETECT: ${{ needs.detect-changes.result }}
        run: |
          # Detect-changes failure (e.g. paths-filter outage) would skip every
          # gated job; treating skipped-as-success there silently green-lights
          # the PR. Require detect-changes to have actually succeeded before
          # accepting any skips downstream.
          if [[ "$DETECT" != "success" ]]; then
            echo "detect-changes did not succeed: $DETECT — gate fails"
            exit 1
          fi
          results=(
            "${{ needs.ci-bun.result }}"
            "${{ needs.ci-rust.result }}"
            "${{ needs.cli-cross.result }}"
            "${{ needs.ci-python.result }}"
            "${{ needs.ci-plugins.result }}"
            "${{ needs.ci-shell.result }}"
            "${{ needs.ci-actions-lint.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job result '$r' — gate fails"
              exit 1
            fi
          done
          echo "All jobs passed or skipped — gate passes"

# Release-bump pipeline — cut a new nbr platform release from conventional commits.
#
# Manually dispatched. Computes the next semver with cocogitto (`cog`), creates
# + pushes the annotated tag `v<n>.<n>.<n>`, opens the GitHub Release for that
# tag, and fills the body with AI-generated notes via `communique`.
#
# Publishing the release fires the EXISTING release.yml (`release: published`),
# which builds the six CLI targets and attaches the binaries — and bakes the
# version from the tag via NBR_RELEASE_VERSION. This workflow does NOT build.
#
# Cargo.toml stays pinned at 0.1.0; the git tag is the source of truth. cog is
# configured (cog.toml) to never rewrite a manifest.

name: Release Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto = derive from conventional commits)'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
        default: auto

permissions:
  contents: write # push the tag + create the release

jobs:
  bump:
    name: Compute version, tag, release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # cog needs full history + tags to compute the bump

      # ── Tooling (cog + communique via mise cargo backend) ─────────────────
      - uses: ./.github/actions/setup-mise
      - name: Install cocogitto + communique
        run: mise use -g cargo:cocogitto cargo:communique

      # ── Identity for the annotated tag we create ──────────────────────────
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Compute next version (cog, dry-run) + create and push the tag ──────
      # Cargo.toml stays pinned at 0.1.0, so there is NOTHING to commit — the
      # version lives only in the git tag. cog computes the next semver from
      # conventional commits (or the dispatched override) WITHOUT side effects
      # (--dry-run prints only the version); we then tag HEAD and push the tag.
      # release.yml bakes the version from the tag via NBR_RELEASE_VERSION.
      - name: Compute version + tag
        id: bump
        run: |
          case "${{ inputs.bump }}" in
            auto)  VERSION=$(mise exec -- cog bump --auto  --dry-run) ;;
            major) VERSION=$(mise exec -- cog bump --major --dry-run) ;;
            minor) VERSION=$(mise exec -- cog bump --minor --dry-run) ;;
            patch) VERSION=$(mise exec -- cog bump --patch --dry-run) ;;
            *) echo "unknown bump: ${{ inputs.bump }}" >&2; exit 1 ;;
          esac || { echo "cog bump --dry-run failed" >&2; exit 1; }
          [ -n "${VERSION}" ] || { echo "cog produced no version" >&2; exit 1; }
          TAG="v${VERSION#v}"
          echo "Next version: ${TAG}"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # ── Create the GitHub Release for the new tag ─────────────────────────
      # Publishing fires release.yml (build + attach binaries) and
      # deploy-production. Body is filled by communique in the next step.
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes "Release notes are being generated…" \
            --verify-tag

      # ── Generate AI release notes into the release body ───────────────────
      # Previous tag is auto-detected; communique.toml pins the model + tone.
      - name: Generate release notes (communique)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_COMMUNIQUE }}
          GITHUB_TOKEN: ${{ github.token }}
        run: mise exec -- communique generate "${{ steps.bump.outputs.tag }}" --github-release

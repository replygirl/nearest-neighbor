name: Deploy — Staging

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly-app.yml
    with:
      app: nearest-neighbor-staging
      env: staging
      config-path: apps/web/fly.staging.toml
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Post-deploy smoke: install the Claude plugin into the real CLI and drive a
  # HEAD-built nbr against the freshly deployed staging API. Non-blocking
  # (alerting only) — "CI green != deploy green"; this catches plugin/CLI/API
  # breakage that unit tests can't (real install + real API reachability).
  plugin-smoke:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-mise
      - name: Plugin install smoke vs staging API
        run: NBR_API_URL="${{ needs.deploy.outputs.url }}" mise run smoke:plugins:staging

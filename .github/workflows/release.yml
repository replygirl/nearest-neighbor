# Platform release pipeline — the SINGLE entry point that cuts a new `nbr`
# platform release and ships it atomically.
#
# Flow: dispatch → bump (commit to main via deploy key) → build → notes → publish
#
#   1. version  — compute the next semver with cocogitto (`cog bump --dry-run`,
#                 no manifest edit, no commit), derive the tag `v<n>.<n>.<n>`,
#                 and fail fast if that tag already exists on origin.
#   2. bump     — stamp that ONE version into every manifest (Cargo.toml/.lock,
#                 both plugin.json, pyproject.toml, both marketplace.json) with
#                 `mise run release:set-version`, commit the bump to main, create
#                 the annotated tag, and push both over SSH using an exempt
#                 deploy key (secret RELEASE_DEPLOY_KEY). main has a
#                 branch-protection ruleset, but deploy keys are an EXEMPT bypass
#                 actor, so this push is accepted without a PR and unsigned. The
#                 commit is idempotent: if the manifests already carry the
#                 version, only the tag is pushed.
#   3. build    — build the six CLI targets in a matrix, packaging each as
#                   nbr-<triple>.tar.gz  (Unix)
#                   nbr-<triple>.zip     (Windows)
#                 and uploading each archive as a workflow artifact. Built at the
#                 bump commit; the version is baked from the tag via
#                 NBR_RELEASE_VERSION (which also matches Cargo.toml now).
#   4. publish  — only AFTER every target built: download all artifacts, generate
#                 SHA256SUMS, write AI-generated notes to a file via `communique`
#                 (no GitHub side effect), then CREATE the release published in a
#                 single `gh release create` call with the notes + every asset
#                 attached (the tag is already on origin from the bump job). We
#                 create it published rather than draft-then-flip because GitHub
#                 does NOT bind a *draft* release to its git tag, so
#                 `gh release edit/view <tag>` returns "release not found" for a
#                 draft (that lookup only sees published releases). Creating the
#                 release published sidesteps the tag lookup and never leaves an
#                 orphan draft. Trade-off: assets upload just after the release
#                 object is created, so there is a brief window where the release
#                 is visible while its binaries finish uploading.
#   5. cleanup  — on failure only: delete the pushed tag from origin so a
#                 re-dispatch can recompute cleanly. main and the bump commit are
#                 left intact (never force-pushed).
#
# Publishing fires `release: published`, which other workflows consume
# (deploy-production deploys the API alongside the CLI). The release is a FULL
# release (no `--prerelease`), matching what installers + `nbr self-update`
# expect.
#
# The git tag and the committed manifests carry the SAME version: `set-version`
# writes the tag's semver into every manifest. cog (cog.toml) stays compute-only
# (no manifest rewrite); this workflow owns the commit and tag. Rustls is used
# for TLS so musl builds need no OpenSSL.
#
# Secret RELEASE_DEPLOY_KEY: an SSH private key for a repo deploy key with write
# access that is registered as an exempt bypass actor on the main ruleset.

name: Release new version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto = derive from conventional commits)'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
        default: auto

permissions:
  contents: write
  actions: write # dispatch deploy-production after publishing the release

jobs:
  # ── Compute the next version (no side effects; the tag is NOT pushed here) ──
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # cog needs full history + tags to compute the bump

      - uses: ./.github/actions/setup-mise
      - name: Install cocogitto
        run: mise use -g aqua:cocogitto/cocogitto # prebuilt binary — no cargo compile

      # cog computes the next semver from conventional commits (or the dispatched
      # override) WITHOUT side effects (--dry-run prints only the version). The
      # bump job then stamps it into the manifests and pushes the commit + tag.
      - name: Compute version
        id: compute
        run: |
          case "${{ inputs.bump }}" in
            auto)  VERSION=$(mise exec -- cog bump --auto  --dry-run) ;;
            major) VERSION=$(mise exec -- cog bump --major --dry-run) ;;
            minor) VERSION=$(mise exec -- cog bump --minor --dry-run) ;;
            patch) VERSION=$(mise exec -- cog bump --patch --dry-run) ;;
            *) echo "unknown bump: ${{ inputs.bump }}" >&2; exit 1 ;;
          esac || { echo "cog bump --dry-run failed" >&2; exit 1; }
          [ -n "${VERSION}" ] || { echo "cog produced no version" >&2; exit 1; }
          VERSION="${VERSION#v}"           # set-version rejects a leading 'v'
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag ${TAG} already exists on origin" >&2
            exit 1
          fi
          echo "Next version: ${TAG}"
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

  # ── Commit the version bump to main + push the tag (over the exempt deploy key)
  bump:
    name: Commit version bump
    needs: version
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      # Check out main over SSH with the deploy key so the later push authenticates
      # as the exempt bypass actor. fetch-depth 0 keeps history for the commit/tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup-mise

      # Stamp the ONE computed version into every manifest (Cargo.toml/.lock,
      # both plugin.json, pyproject.toml, both marketplace.json). set-version
      # needs only mise (usage-spec task + oxfmt) and jq — no cocogitto here.
      - name: Set platform version across all manifests
        run: mise run release:set-version -- "${{ needs.version.outputs.version }}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Idempotent: only commit + push main if the stamp actually changed a file
      # (a re-run at the same version skips the commit). The annotated tag is
      # always created at the resulting HEAD and pushed. Both pushes ride the
      # deploy key, which is exempt from the main branch-protection ruleset.
      - name: Commit, tag, and push
        id: commit
        # The bot's commit + push are mechanical and already normalised
        # (set-version ran taplo/oxfmt), so skip the developer git hooks via hk's
        # OWN env vars — NOT `git --no-verify`. HK_SKIP_HOOK bypasses hk's
        # pre-commit + commit-msg (the latter needs dev-only commitlint deps this
        # job doesn't install); HK=0 bypasses the custom pre-push gate, which on
        # main would otherwise run the full slow test profile.
        env:
          HK: '0'
          HK_SKIP_HOOK: pre-commit,commit-msg
        run: |
          TAG=${{ needs.version.outputs.tag }}
          if [ -n "$(git status --porcelain)" ]; then
            git commit -am "chore(release): ${TAG}"
            git push origin HEAD:main
          else
            echo "Manifests already at ${TAG#v} — skipping commit."
          fi
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          SHA=$(git rev-parse HEAD)
          echo "Bump HEAD: ${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

  # ── Build the six target triples natively and upload each as an artifact ────
  build:
    name: Build ${{ matrix.target }}
    needs: [version, bump]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target (smallest/newest standard image for each
        # OS+arch), so every triple builds natively — no cross-compilation.
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-26 # Apple Silicon
            archive: tar.gz

          - target: x86_64-apple-darwin
            runner: macos-26-intel # Intel
            archive: tar.gz

          # ── Linux musl (static, no OpenSSL, no dbus) ──────────────────────
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-26.04-arm # native arm64 runner (preview)
            archive: tar.gz

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-26.04 # preview
            archive: tar.gz

          # ── Windows ───────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive: zip

          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm # native arm64 runner
            archive: zip

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.sha }}

      # ── Rust toolchain ─────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # SHA-pinned to a master commit, so the channel must be set explicitly
          # (the @stable branch ref defaults this; a SHA pin does not).
          toolchain: stable
          targets: ${{ matrix.target }}

      # ── musl libc + linker (both musl targets build natively) ──────────────
      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      # ── Cargo cache ────────────────────────────────────────────────────────
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
          workspaces: apps/cli

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        working-directory: apps/cli
        env:
          NBR_RELEASE_VERSION: ${{ needs.version.outputs.tag }}
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package: tar.gz (Unix) ─────────────────────────────────────────────
      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TRIPLE=${{ matrix.target }}
          BIN=apps/cli/target/${TRIPLE}/release/nbr
          STAGING=nbr-${TRIPLE}
          mkdir -p "${STAGING}"
          cp "${BIN}" "${STAGING}/nbr"
          cp apps/cli/README.md "${STAGING}/"
          cp LICENSE "${STAGING}/"
          tar -czf "${STAGING}.tar.gz" "${STAGING}"

      # ── Package: zip (Windows) ────────────────────────────────────────────
      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $triple = "${{ matrix.target }}"
          $bin    = "apps\cli\target\$triple\release\nbr.exe"
          $dir    = "nbr-$triple"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item $bin         "$dir\nbr.exe"
          Copy-Item apps\cli\README.md "$dir\README.md"
          Copy-Item LICENSE       "$dir\LICENSE"
          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip"

      # ── Upload artifact for the publish job ──────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nbr-${{ matrix.target }}
          path: nbr-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  # ── Collect artifacts, generate notes, publish atomically (tag already pushed)
  publish:
    name: Publish release
    needs: [version, bump, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.sha }}
          fetch-depth: 0 # communique reads commit history to write the notes

      - uses: ./.github/actions/setup-mise
      - name: Install communique
        run: mise use -g ubi:jdx/communique # prebuilt binary — no cargo compile

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/

      - name: Flatten dist/ (remove per-artifact sub-dirs)
        run: |
          find dist/ -mindepth 2 -type f -exec mv {} dist/ \;
          rmdir dist/nbr-* 2>/dev/null || true
          ls -lh dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum nbr-*.tar.gz nbr-*.zip > SHA256SUMS

      # ── Generate notes to a file, then CREATE the published release ───────────
      # communique writes the AI notes to a file (no GitHub side effect); the tag
      # is already on origin (pushed by the bump job). A single `gh release create`
      # then publishes the release with the notes and every asset in one call.
      #
      # Note: because the release is created with the default GITHUB_TOKEN,
      # GitHub suppresses the resulting `release: published` event (Actions
      # recursion guard) — it will NOT trigger other workflows. Production is
      # deployed via an explicit `gh workflow run` dispatch below instead; the
      # `release:` trigger on deploy-production.yml still serves manually
      # created releases.
      #
      # Why create-published instead of create-draft-then-`gh release edit`: a
      # draft release is not bound to its git tag, so `gh release edit/view <tag>`
      # returns "release not found" for a draft (that endpoint only sees published
      # releases). Publishing directly avoids the tag lookup — and never orphans a
      # draft on failure. Trade-off: assets upload just after the release object is
      # created, so there is a brief window where the release is visible while its
      # binaries finish uploading.
      - name: Generate release notes (communique)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_COMMUNIQUE }}
          GITHUB_TOKEN: ${{ github.token }}
        run: mise exec -- communique generate "${{ needs.version.outputs.tag }}" --output RELEASE_NOTES.md

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ needs.version.outputs.tag }}
          gh release create "${TAG}" \
            --verify-tag \
            --title "${TAG}" \
            --notes-file RELEASE_NOTES.md \
            dist/nbr-*.tar.gz dist/nbr-*.zip dist/SHA256SUMS

      # Explicit dispatches are exempt from the GITHUB_TOKEN event suppression,
      # so this works with the default token (needs `actions: write`).
      #
      # Non-blocking: by this point the release is already published, and a
      # failure here would otherwise trip the cleanup job into deleting the tag
      # out from under a live release. On failure, dispatch manually via
      # `gh workflow run deploy-production.yml --ref <tag>`.
      - name: Deploy production
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ needs.version.outputs.tag }}
          if ! gh workflow run deploy-production.yml --ref "${TAG}"; then
            echo "::warning::Failed to dispatch deploy-production for ${TAG} — run it manually: gh workflow run deploy-production.yml --ref ${TAG}"
          fi

  # ── On failure only: roll the pushed tag back so a re-dispatch recomputes ───
  # Deletes ONLY the tag from origin (best-effort). main and the bump commit are
  # left intact — never force-pushed, never reverted.
  cleanup:
    name: Roll back tag on failure
    needs: [version, bump, build, publish]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          ref: main
          fetch-depth: 0

      - name: Delete the tag from origin
        env:
          HK: '0' # skip the custom pre-push gate for the bot's tag-delete push
        run: |
          TAG=${{ needs.version.outputs.tag }}
          [ -n "${TAG}" ] || { echo "no tag computed; nothing to clean up"; exit 0; }
          echo "Deleting ${TAG} from origin (best-effort)"
          git push origin ":refs/tags/${TAG}" || true

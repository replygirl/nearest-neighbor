# Platform release pipeline — builds and attaches the `nbr` CLI binary to a GitHub Release.
#
# Model: the owner creates a GitHub Release in the web UI (draft → publish).
# Publishing fires `release: published`, which triggers this workflow to build
# the five CLI targets and attach the binaries to the existing release.
# No release is ever created by CI; title, body, draft, and prerelease flags
# are left exactly as the owner set them.
#
# Prereleases are treated as real releases: `release: published` fires for both
# prerelease and full releases, so binaries are always attached. deploy-production
# also runs on `release: published` so prerelease → prod deploy works end-to-end.
#
# Manual re-attach: workflow_dispatch lets you (re)build and attach binaries for
# an existing tag without republishing the release. Supply the tag name (e.g. v0.2.0).
#
# Builds five target triples in a matrix, packages each as
#   nbr-<triple>.tar.xz  (Unix)
#   nbr-<triple>.zip     (Windows)
# Generates SHA256SUMS and uploads all assets with `gh release upload --clobber`.
#
# Rustls is used for TLS so musl builds need no OpenSSL.

name: CLI Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)attach nbr binaries to'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.xz
            cross: false

          - target: x86_64-apple-darwin
            runner: macos-15-intel # Intel runner
            archive: tar.xz
            cross: false

          # ── Linux musl (static, no OpenSSL, no dbus) ──────────────────────
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04
            archive: tar.xz
            cross: true # use cross-rs for aarch64 cross-compile

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            archive: tar.xz
            cross: false

          # ── Windows ───────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            cross: false

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      # ── Rust toolchain ─────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── musl libc + linker (native x86_64-musl only) ───────────────────────
      - name: Install musl tools (x86_64-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl' && !matrix.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      # ── cross-rs for aarch64-musl ──────────────────────────────────────────────
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Cargo cache ────────────────────────────────────────────────────────
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (cross)
        if: matrix.cross
        working-directory: apps/cli
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.cross'
        working-directory: apps/cli
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package: tar.xz (Unix) ─────────────────────────────────────────────
      - name: Package tar.xz
        if: matrix.archive == 'tar.xz'
        shell: bash
        run: |
          TRIPLE=${{ matrix.target }}
          BIN=target/${TRIPLE}/release/nbr
          STAGING=nbr-${TRIPLE}
          mkdir -p "${STAGING}"
          cp "${BIN}" "${STAGING}/nbr"
          cp apps/cli/README.md "${STAGING}/"
          cp LICENSE "${STAGING}/"
          tar -cJf "${STAGING}.tar.xz" "${STAGING}"

      # ── Package: zip (Windows) ────────────────────────────────────────────
      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $triple = "${{ matrix.target }}"
          $bin    = "target\$triple\release\nbr.exe"
          $dir    = "nbr-$triple"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item $bin         "$dir\nbr.exe"
          Copy-Item apps\cli\README.md "$dir\README.md"
          Copy-Item LICENSE       "$dir\LICENSE"
          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip"

      # ── Upload artifact for the checksum + attach jobs ───────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nbr-${{ matrix.target }}
          path: nbr-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  # ── Collect all artifacts, compute checksums, attach to the existing release ──
  attach:
    name: Attach nbr binaries to the release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten dist/ (remove per-artifact sub-dirs)
        run: |
          find dist/ -mindepth 2 -type f -exec mv {} dist/ \;
          rmdir dist/nbr-* 2>/dev/null || true
          ls -lh dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum nbr-*.tar.xz nbr-*.zip > SHA256SUMS

      - name: Attach assets to the existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ github.event.release.tag_name || inputs.tag }}
          gh release upload "${TAG}" dist/nbr-*.tar.xz dist/nbr-*.zip dist/SHA256SUMS --clobber

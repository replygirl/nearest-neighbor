# Platform release pipeline — builds and attaches the `nbr` CLI binary to a GitHub Release.
#
# Model: the owner creates a GitHub Release in the web UI (draft → publish).
# Publishing fires `release: published`, which triggers this workflow to build
# the five CLI targets and attach the binaries to the existing release.
# No release is ever created by CI; title, body, draft, and prerelease flags
# are left exactly as the owner set them.
#
# Prereleases are treated as real releases: `release: published` fires for both
# prerelease and full releases, so binaries are always attached. deploy-production
# also runs on `release: published` so prerelease → prod deploy works end-to-end.
#
# Manual re-attach: workflow_dispatch lets you (re)build and attach binaries for
# an existing tag without republishing the release. Supply the tag name (e.g. v0.2.0).
#
# Builds five target triples in a matrix, packages each as
#   nbr-<triple>.tar.xz  (Unix)
#   nbr-<triple>.zip     (Windows)
# Generates SHA256SUMS and uploads all assets with `gh release upload --clobber`.
#
# Rustls is used for TLS so musl builds need no OpenSSL.

name: CLI Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)attach nbr binaries to'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target (smallest/newest standard image for each
        # OS+arch), so every triple builds natively — no cross-compilation.
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-26 # Apple Silicon
            archive: tar.xz

          - target: x86_64-apple-darwin
            runner: macos-26-intel # Intel
            archive: tar.xz

          # ── Linux musl (static, no OpenSSL, no dbus) ──────────────────────
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-26.04-arm # native arm64 runner (preview)
            archive: tar.xz

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-26.04 # preview
            archive: tar.xz

          # ── Windows ───────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive: zip

          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm # native arm64 runner
            archive: zip

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      # ── Rust toolchain ─────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # SHA-pinned to a master commit, so the channel must be set explicitly
          # (the @stable branch ref defaults this; a SHA pin does not).
          toolchain: stable
          targets: ${{ matrix.target }}

      # ── musl libc + linker (both musl targets build natively) ──────────────
      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      # ── Cargo cache ────────────────────────────────────────────────────────
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
          workspaces: apps/cli

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        working-directory: apps/cli
        env:
          NBR_RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.tag }}
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package: tar.xz (Unix) ─────────────────────────────────────────────
      - name: Package tar.xz
        if: matrix.archive == 'tar.xz'
        shell: bash
        run: |
          TRIPLE=${{ matrix.target }}
          BIN=apps/cli/target/${TRIPLE}/release/nbr
          STAGING=nbr-${TRIPLE}
          mkdir -p "${STAGING}"
          cp "${BIN}" "${STAGING}/nbr"
          cp apps/cli/README.md "${STAGING}/"
          cp LICENSE "${STAGING}/"
          tar -cJf "${STAGING}.tar.xz" "${STAGING}"

      # ── Package: zip (Windows) ────────────────────────────────────────────
      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $triple = "${{ matrix.target }}"
          $bin    = "apps\cli\target\$triple\release\nbr.exe"
          $dir    = "nbr-$triple"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item $bin         "$dir\nbr.exe"
          Copy-Item apps\cli\README.md "$dir\README.md"
          Copy-Item LICENSE       "$dir\LICENSE"
          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip"

      # ── Upload artifact for the checksum + attach jobs ───────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nbr-${{ matrix.target }}
          path: nbr-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  # ── Collect all artifacts, compute checksums, attach to the existing release ──
  attach:
    name: Attach nbr binaries to the release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/

      - name: Flatten dist/ (remove per-artifact sub-dirs)
        run: |
          find dist/ -mindepth 2 -type f -exec mv {} dist/ \;
          rmdir dist/nbr-* 2>/dev/null || true
          ls -lh dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum nbr-*.tar.xz nbr-*.zip > SHA256SUMS

      - name: Attach assets to the existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ github.event.release.tag_name || inputs.tag }}
          gh release upload "${TAG}" dist/nbr-*.tar.xz dist/nbr-*.zip dist/SHA256SUMS --clobber

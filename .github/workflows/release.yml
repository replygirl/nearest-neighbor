# Platform release pipeline — the SINGLE entry point that cuts a new `nbr`
# platform release and ships it atomically.
#
# Flow: dispatch → version → build → notes → publish
#
#   1. version  — compute the next semver with cocogitto (`cog bump --dry-run`,
#                 no manifest edit, no commit), derive the tag `v<n>.<n>.<n>`,
#                 and fail fast if that tag already exists on origin. The tag is
#                 NOT pushed here.
#   2. build    — build the six CLI targets in a matrix, packaging each as
#                   nbr-<triple>.tar.gz  (Unix)
#                   nbr-<triple>.zip     (Windows)
#                 and uploading each archive as a workflow artifact. The version
#                 is baked from the computed tag via NBR_RELEASE_VERSION.
#   3. publish  — only AFTER every target built: push the annotated tag (so a
#                 build failure leaves no dangling tag), download all artifacts,
#                 generate SHA256SUMS, create a DRAFT release with all assets +
#                 placeholder notes, fill the body with AI-generated notes via
#                 `communique`, then flip the release to published. There is no
#                 window where the release is visible without its binaries.
#
# Publishing fires `release: published`, which other workflows consume
# (deploy-production deploys the API alongside the CLI). The release is a FULL
# release (no `--prerelease`), matching what installers + `nbr self-update`
# expect.
#
# Cargo.toml stays pinned at 0.1.0; the git tag is the single source of truth.
# cog (cog.toml) is configured to never rewrite a manifest. Rustls is used for
# TLS so musl builds need no OpenSSL.

name: CLI Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto = derive from conventional commits)'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
        default: auto

permissions:
  contents: write

jobs:
  # ── Compute the next version (no side effects; the tag is NOT pushed here) ──
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      sha: ${{ steps.compute.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # cog needs full history + tags to compute the bump

      - uses: ./.github/actions/setup-mise
      - name: Install cocogitto
        run: mise use -g cargo:cocogitto

      # Cargo.toml stays pinned at 0.1.0, so there is NOTHING to commit — the
      # version lives only in the git tag. cog computes the next semver from
      # conventional commits (or the dispatched override) WITHOUT side effects
      # (--dry-run prints only the version). The tag is pushed later, in
      # `publish`, only after every target has built.
      - name: Compute version
        id: compute
        run: |
          case "${{ inputs.bump }}" in
            auto)  VERSION=$(mise exec -- cog bump --auto  --dry-run) ;;
            major) VERSION=$(mise exec -- cog bump --major --dry-run) ;;
            minor) VERSION=$(mise exec -- cog bump --minor --dry-run) ;;
            patch) VERSION=$(mise exec -- cog bump --patch --dry-run) ;;
            *) echo "unknown bump: ${{ inputs.bump }}" >&2; exit 1 ;;
          esac || { echo "cog bump --dry-run failed" >&2; exit 1; }
          [ -n "${VERSION}" ] || { echo "cog produced no version" >&2; exit 1; }
          TAG="v${VERSION#v}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "tag ${TAG} already exists on origin" >&2
            exit 1
          fi
          SHA=$(git rev-parse HEAD)
          echo "Next version: ${TAG} (at ${SHA})"
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "sha=${SHA}"
          } >> "$GITHUB_OUTPUT"

  # ── Build the six target triples natively and upload each as an artifact ────
  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target (smallest/newest standard image for each
        # OS+arch), so every triple builds natively — no cross-compilation.
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-26 # Apple Silicon
            archive: tar.gz

          - target: x86_64-apple-darwin
            runner: macos-26-intel # Intel
            archive: tar.gz

          # ── Linux musl (static, no OpenSSL, no dbus) ──────────────────────
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-26.04-arm # native arm64 runner (preview)
            archive: tar.gz

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-26.04 # preview
            archive: tar.gz

          # ── Windows ───────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive: zip

          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm # native arm64 runner
            archive: zip

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.sha }}

      # ── Rust toolchain ─────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # SHA-pinned to a master commit, so the channel must be set explicitly
          # (the @stable branch ref defaults this; a SHA pin does not).
          toolchain: stable
          targets: ${{ matrix.target }}

      # ── musl libc + linker (both musl targets build natively) ──────────────
      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      # ── Cargo cache ────────────────────────────────────────────────────────
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
          workspaces: apps/cli

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        working-directory: apps/cli
        env:
          NBR_RELEASE_VERSION: ${{ needs.version.outputs.tag }}
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package: tar.gz (Unix) ─────────────────────────────────────────────
      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TRIPLE=${{ matrix.target }}
          BIN=apps/cli/target/${TRIPLE}/release/nbr
          STAGING=nbr-${TRIPLE}
          mkdir -p "${STAGING}"
          cp "${BIN}" "${STAGING}/nbr"
          cp apps/cli/README.md "${STAGING}/"
          cp LICENSE "${STAGING}/"
          tar -czf "${STAGING}.tar.gz" "${STAGING}"

      # ── Package: zip (Windows) ────────────────────────────────────────────
      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $triple = "${{ matrix.target }}"
          $bin    = "apps\cli\target\$triple\release\nbr.exe"
          $dir    = "nbr-$triple"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item $bin         "$dir\nbr.exe"
          Copy-Item apps\cli\README.md "$dir\README.md"
          Copy-Item LICENSE       "$dir\LICENSE"
          Compress-Archive -Path "$dir\*" -DestinationPath "$dir.zip"

      # ── Upload artifact for the publish job ──────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nbr-${{ matrix.target }}
          path: nbr-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  # ── Push the tag, collect artifacts, generate notes, publish atomically ─────
  publish:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.version.outputs.sha }}
          fetch-depth: 0 # communique reads commit history to write the notes

      - uses: ./.github/actions/setup-mise
      - name: Install communique
        run: mise use -g cargo:communique

      # ── Push the tag NOW — only after every target built, so a build failure
      #    leaves no dangling tag. The tag must exist on origin before the draft
      #    release is created (gh --verify-tag) and before communique runs.
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Push annotated tag
        run: |
          TAG=${{ needs.version.outputs.tag }}
          git tag -a "${TAG}" -m "${TAG}" "${{ needs.version.outputs.sha }}"
          git push origin "${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/

      - name: Flatten dist/ (remove per-artifact sub-dirs)
        run: |
          find dist/ -mindepth 2 -type f -exec mv {} dist/ \;
          rmdir dist/nbr-* 2>/dev/null || true
          ls -lh dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum nbr-*.tar.gz nbr-*.zip > SHA256SUMS

      # ── Publish with NO missing-binaries window ───────────────────────────
      # Create a DRAFT release with every asset already attached, fill the body
      # with AI-generated notes (communique edits the draft in place), then flip
      # to published — the release becomes visible already complete. Flipping a
      # draft to published fires `release: published` for downstream consumers.
      - name: Create draft release with all assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ needs.version.outputs.tag }}
          gh release create "${TAG}" \
            --draft \
            --verify-tag \
            --title "${TAG}" \
            --notes "Release notes are being generated…" \
            dist/nbr-*.tar.gz dist/nbr-*.zip dist/SHA256SUMS

      - name: Generate release notes (communique)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_COMMUNIQUE }}
          GITHUB_TOKEN: ${{ github.token }}
        run: mise exec -- communique generate "${{ needs.version.outputs.tag }}" --github-release

      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.version.outputs.tag }}" --draft=false
